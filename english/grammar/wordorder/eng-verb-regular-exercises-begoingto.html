    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["to / I / am / going / study / English / .", "I am going to study English.", "私は英語を勉強するつもりです。"],
            ["visit / am / I / to / going / Kyoto / .", "I am going to visit Kyoto.", "私は京都を訪れるつもりです。"],
            ["you / are / play / soccer / going / to / .", "You are going to play soccer.", "あなたはサッカーをするつもりです。"],
            ["to / see / are / going / a / you / movie / .", "You are going to see a movie.", "あなたは映画を見るつもりです。"],
            ["is / going / he / read / to / a / book / .", "He is going to read a book.", "彼は本を読むつもりです。"],
            ["going / he / is / to / swim / in / the / pool / .", "He is going to swim in the pool.", "彼はプールで泳ぐつもりです。"],
            ["are / to / you / going / write / a / letter / .", "You are going to write a letter.", "あなたは手紙を書くつもりです。"],
            ["we / are / going / clean / to / the / park / .", "We are going to clean the park.", "私たちは公園を掃除するつもりです。"],
            ["they / going / to / are / travel / abroad / .", "They are going to travel abroad.", "彼らは海外旅行をするつもりです。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
