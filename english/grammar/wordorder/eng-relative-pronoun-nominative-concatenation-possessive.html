<body class="container mt-5">

    <!-- タイトル -->
    <?php include 'eng-inc-close-btn.html'; ?>
    <h1 class="title">関係代名詞 所有格 単文から作成 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の2つの単文から関係代名詞を使って1つの英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["This is the book. She gave it to me.", "This is the book which she gave me.", "これは彼女が私にくれた本です。"],
            ["That is the boy. I saw him at the station.", "That is the boy whom I saw at the station.", "あれは私が駅で見かけた少年です。"],
            ["This is the room. We cleaned it yesterday.", "This is the room which we cleaned yesterday.", "これは私たちが昨日掃除した部屋です。"],
            ["He is the English teacher. She met him.", "He is the English teacher whom she met.", "彼は彼女が会った英語の先生です。"],
            ["This is the new pen. I bought it.", "This is the new pen which I bought.", "これは私が買った新しいペンです。"],
            ["The woman is kind. I helped her.", "The woman whom I helped is kind.", "私が助けたその女性は親切です。"],
            ["The food is delicious. She made it yesterday.", "The food which she made yesterday is delicious.", "彼女が昨日作った料理はおいしいです。"],
            ["The man is rich. They met him in America.", "The man whom they met in America is rich.", "彼らがアメリカで会ったその男性は裕福です。"],
            ["This is the new CD. I bought it.", "This is the new CD which I bought.", "これは私が買った新しいCDです。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
