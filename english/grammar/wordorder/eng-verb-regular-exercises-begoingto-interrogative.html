    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["am / going / to / study / I / English / ?", "Am I going to study English?", "私は英語を勉強するつもりですか。"],
            ["to / going / am / I / visit / Osaka / ?", "Am I going to visit Osaka?", "私は大阪を訪れるつもりですか。"],
            ["you / going / are / play / to / soccer / ?", "Are you going to play soccer?", "あなたはサッカーをするつもりですか。"],
            ["see / a / movie / are / going / to / you / ?", "Are you going to see a movie?", "あなたは映画を見るつもりですか。"],
            ["he / going / to / is / read / a / book / ?", "Is he going to read a book?", "彼は本を読むつもりですか。"],
            ["swim / in / the / pool / is / going / he / to / ?", "Is he going to swim in the pool?", "彼はプールで泳ぐつもりですか。"],
            ["going / are / you / to / write / a / letter / ?", "Are you going to write a letter?", "あなたは手紙を書くつもりですか。"],
            ["we / going / to / clean / are / the / park / ?", "Are we going to clean the park?", "私たちは公園を掃除するつもりですか。"],
            ["they / going / abroad / to / are / travel / ?", "Are they going to travel abroad?", "彼らは海外旅行をするつもりですか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
