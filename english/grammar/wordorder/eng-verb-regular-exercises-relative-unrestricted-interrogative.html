<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>関係代名詞非制限用法 疑問文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">関係代名詞非制限用法 疑問文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-relative-unrestricted-interrogative.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["your / brother / , / who / lives / in / Osaka / , / is / a / doctor / ?", "Is your brother, who lives in Osaka, a doctor?", "大阪に住んでいるあなたの兄は医者ですか。"],
            ["this / book / , / which / was / written / by / your / teacher / , / interesting / is / ?", "Is this book, which was written by your teacher, interesting?", "あなたの先生が書いたこの本は面白いですか。"],
            ["Mr / Smith / , / who / teaches / you / math / , / kind / is / ?", "Is Mr. Smith, who teaches you math, kind?", "あなたに数学を教えているスミス先生は親切ですか。"],
            ["Kyoto / , / which / is / famous / for / its / temples / , / popular / is / with / tourists / ?", "Is Kyoto, which is famous for its temples, popular with tourists?", "寺で有名な京都は観光客に人気がありますか。"],
            ["your / friend / , / whose / father / is / a / pilot / , / to / be / a / pilot / too / wants / ?", "Does your friend, whose father is a pilot, want to be a pilot too?", "父がパイロットであるあなたの友達は、自分もパイロットになりたいと思っていますか。"],
            ["Paris / , / where / you / visited / last / year / , / beautiful / is / ?", "Is Paris, where you visited last year, beautiful?", "あなたが去年訪れたパリは美しいですか。"],
            ["the / car / , / which / was / very / expensive / , / his / is / ?", "Is the car, which was very expensive, his?", "とても高価だったその車は彼のものですか。"],
            ["your / sister / , / who / is / good / at / piano / , / a / prize / win / did / ?", "Did your sister, who is good at piano, win a prize?", "ピアノが得意なあなたの姉は賞を取りましたか。"],
            ["Mount / Fuji / , / which / is / the / highest / mountain / in / Japan / , / beautiful / is / ?", "Is Mount Fuji, which is the highest mountain in Japan, beautiful?", "日本で一番高い山である富士山は美しいですか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
