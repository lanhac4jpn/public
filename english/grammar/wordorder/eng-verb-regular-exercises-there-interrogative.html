    <h1 class="title">There構文 疑問文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["a / there / near / is / park / ?", "Is there a park near?", "近くに公園はありますか。"],
            ["in / my / is / desk / room / there / a / ?", "Is there a desk in my room?", "私の部屋に机はありますか。"],
            ["the / apple / an / is / table / on / there / ?", "Is there an apple on the table?", "テーブルの上にりんごはありますか。"],
            ["desk / books / are / many / on / there / the / ?", "Are there many books on the desk?", "机の上にたくさんの本がありますか。"],
            ["the / ten / class / in / are / students / there / ?", "Are there ten students in the class?", "クラスに10人の生徒がいますか。"],
            ["under / are / two / there / the / cats / tree / ?", "Are there two cats under the tree?", "木の下に2匹の猫がいますか。"],
            ["bus / is / front / there / a / stop / in / ?", "Is there a bus stop in front?", "前にバス停はありますか。"],
            ["flowers / beautiful / in / there / garden / some / the / are / ?", "Are there some beautiful flowers in the garden?", "庭にきれいな花がありますか。"],
            ["in / park / are / many / people / the / there / ?", "Are there many people in the park?", "公園にたくさんの人がいますか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
