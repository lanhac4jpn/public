    <h1 class="title">関係副詞 疑問文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["the / time / when / stayed / this / you / is / home / ?", "Is this the time when you stayed home?", "これはあなたが家にいた時ですか。"],
            ["the / where / we / met / is / park / the / ?", "Is this the park where we met?", "これは私たちが会った公園ですか。"],
            ["reason / study / why / is / this / the / hard / you / ?", "Is this the reason why you study hard?", "これはあなたが一生懸命勉強する理由ですか。"],
            ["the / was / day / met / when / you / Tom / that / ?", "Was that the day when you met Tom?", "それはあなたがトムに会った日でしたか。"],
            ["restaurant / had / lunch / the / we / is / good / where / the / ?", "Is the restaurant where we had lunch good?", "私たちが昼食を食べたレストランは良いですか。"],
            ["reason / she / was / the / why / is / surprised / ?", "Is the reason why she was surprised?", "彼女が驚いた理由はそれですか。"],
            ["forget / never / will / day / you / won / when / game / the / the / ?", "Will you never forget the day when you won the game?", "あなたは試合に勝った日を決して忘れないでしょうか。"],
            ["hotel / good / was / the / where / stayed / very / you / ?", "Was the hotel where you stayed very good?", "あなたが泊まったホテルはとても良かったですか。"],
            ["the / reason / happy / why / are / is / you / this / ?", "Is this the reason why you are happy?", "これはあなたが幸せな理由ですか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
