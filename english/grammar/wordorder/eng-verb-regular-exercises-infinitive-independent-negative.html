<!DOCTYPE html>

<head>

    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <?php include 'eng-inc-close-btn.html'; ?>
    <h1 class="title">不定詞 独立不定詞 否定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["to / be / honest / I / not / am / happy / .", "To be honest, I am not happy.", "正直に言うと、私は幸せではありません。"],
            ["to / tell / the / truth / he / did / not / come / .", "To tell the truth, he did not come.", "本当のことを言うと、彼は来ませんでした。"],
            ["to / begin / with / this / problem / is / not / easy / .", "To begin with, this problem is not easy.", "まず第一に、この問題は簡単ではありません。"],
            ["to / be / frank / I / do / not / like / this / book / .", "To be frank, I do not like this book.", "率直に言うと、私はこの本が好きではありません。"],
            ["to / my / surprise / the / exam / was / not / difficult / .", "To my surprise, the exam was not difficult.", "驚いたことに、その試験は難しくありませんでした。"],
            ["to / be / honest / he / is / not / a / good / student / .", "To be honest, he is not a good student.", "正直に言うと、彼は良い生徒ではありません。"],
            ["to / tell / the / truth / they / will / not / come / tomorrow / .", "To tell the truth, they will not come tomorrow.", "本当のことを言うと、彼らは明日来ないでしょう。"],
            ["to / begin / with / the / story / is / not / long / .", "To begin with, the story is not long.", "まず第一に、その話は長くありません。"],
            ["to / my / joy / she / did / not / win / the / game / .", "To my joy, she did not win the game.", "うれしいことに、彼女は試合に勝ちませんでした。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
