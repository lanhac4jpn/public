<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>形式主語 否定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">形式主語 否定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-itis-negative.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["not / it / is / study / English / to / difficult / .", "It is not difficult to study English.", "英語を勉強することは難しくありません。"],
            ["is / not / expensive / buy / it / to / this / book / .", "It is not expensive to buy this book.", "この本を買うことは高くありません。"],
            ["not / it / to / dangerous / is / play / soccer / .", "It is not dangerous to play soccer.", "サッカーをすることは危険ではありません。"],
            ["go / to / far / school / not / it / is / to / .", "It is not far to go to school.", "学校へ行くことは遠くありません。"],
            ["speak / is / it / not / to / easy / English / .", "It is not easy to speak English.", "英語を話すことは簡単ではありません。"],
            ["climb / the / it / not / is / mountain / to / hard / .", "It is not hard to climb the mountain.", "その山に登ることは難しくありません。"],
            ["boring / learn / not / it / is / to / history / .", "It is not boring to learn history.", "歴史を学ぶことは退屈ではありません。"],
            ["important / not / get / is / it / to / up / early / .", "It is not important to get up early.", "早起きすることは大切ではありません。"],
            ["necessary / it / practice / not / is / to / every / day / .", "It is not necessary to practice every day.", "毎日練習することは必要ではありません。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
