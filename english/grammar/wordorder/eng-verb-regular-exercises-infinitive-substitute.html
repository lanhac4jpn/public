<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不定詞 代不定詞 肯定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">不定詞 代不定詞 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-infinitive-substitute.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["I / want / to / play / tennis / and / he / wants / to / .", "I want to play tennis, and he wants to.", "私はテニスをしたい、そして彼もそうしたいです。"],
            ["she / likes / to / read / books / and / I / like / to / .", "She likes to read books, and I like to.", "彼女は本を読むのが好きで、私もそうです。"],
            ["they / plan / to / visit / Kyoto / and / we / plan / to / .", "They plan to visit Kyoto, and we plan to.", "彼らは京都を訪れる予定で、私たちもそうです。"],
            ["I / need / to / study / math / and / you / need / to / .", "I need to study math, and you need to.", "私は数学を勉強する必要があり、あなたもそうです。"],
            ["we / want / to / go / swimming / and / they / want / to / .", "We want to go swimming, and they want to.", "私たちは泳ぎに行きたい、そして彼らもそうです。"],
            ["Ken / decided / to / join / the / club / and / I / decided / to / .", "Ken decided to join the club, and I decided to.", "ケンはクラブに入ることを決め、私もそうしました。"],
            ["she / tried / to / speak / English / and / he / tried / to / .", "She tried to speak English, and he tried to.", "彼女は英語を話そうとし、彼もそうしました。"],
            ["I / began / to / play / the / guitar / and / my / friend / began / to / .", "I began to play the guitar, and my friend began to.", "私はギターを弾き始め、友達もそうしました。"],
            ["we / hope / to / see / the / movie / and / our / teacher / hopes / to / .", "We hope to see the movie, and our teacher hopes to.", "私たちはその映画を見たいと思っていて、先生もそうです。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
