    <h1 class="title">不定詞 原形不定詞 知覚動詞 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["him / saw / I / soccer / play / .", "I saw him play soccer.", "私は彼がサッカーをするのを見ました。"],
            ["heard / she / the / dog / bark / .", "She heard the dog bark.", "彼女は犬が吠えるのを聞きました。"],
            ["watched / dance / we / them / .", "We watched them dance.", "私たちは彼らが踊るのを見ました。"],
            ["saw / play / the / children / I / in / park / the / .", "I saw the children play in the park.", "私は子どもたちが公園で遊ぶのを見ました。"],
            ["him / the / piano / heard / play / she / .", "She heard him play the piano.", "彼女は彼がピアノを弾くのを聞きました。"],
            ["noticed / I / enter / the / room / her / .", "I noticed her enter the room.", "私は彼女が部屋に入るのに気づきました。"],
            ["watched / run / they / the / boy / .", "They watched the boy run.", "彼らはその少年が走るのを見ました。"],
            ["listened / sing / we / the / bird / to / .", "We listened to the bird sing.", "私たちは鳥が歌うのを聞きました。"],
            ["felt / wind / the / I / blow / .", "I felt the wind blow.", "私は風が吹くのを感じました。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
