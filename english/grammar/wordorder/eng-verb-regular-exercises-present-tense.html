<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現在形進行形 肯定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">現在形進行形 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-present-tense.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["I / am / dinner / having / .", "I am having dinner.", "私は夕食を食べています。"],
            ["am / now / reading / I / book / a / .", "I am reading a book now.", "私は今本を読んでいます。"],
            ["you / English / are / studying / .", "You are studying English.", "あなたは英語を勉強しています。"],
            ["soccer / playing / you / are / .", "You are playing soccer.", "あなたはサッカーをしています。"],
            ["he / a / watching / is / movie / .", "He is watching a movie.", "彼は映画を見ています。"],
            ["is / homework / doing / he / his / .", "He is doing his homework.", "彼は宿題をしています。"],
            ["at / you / are / now / home / .", "You are at home now.", "あなたはいま家にいます。"],
            ["we / are / lunch / having / .", "We are having lunch.", "私たちは昼食を食べています。"],
            ["soccer / are / playing / they / .", "They are playing soccer.", "彼らはサッカーをしています。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
