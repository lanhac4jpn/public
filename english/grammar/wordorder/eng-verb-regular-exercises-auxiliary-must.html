    <h1 class="title">助動詞 Must 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["I / must / study / today / .", "I must study today.", "私は今日勉強しなければなりません。"],
            ["homework / do / I / must / my / .", "I must do my homework.", "私は宿題をしなければなりません。"],
            ["must / you / go / now / .", "You must go now.", "あなたは今行かなければなりません。"],
            ["listen / must / to / you / teacher / the / .", "You must listen to the teacher.", "あなたは先生の話を聞かなければなりません。"],
            ["he / to / must / school / go / .", "He must go to school.", "彼は学校に行かなければなりません。"],
            ["take / medicine / must / he / his / .", "He must take his medicine.", "彼は薬を飲まなければなりません。"],
            ["be / careful / must / you / .", "You must be careful.", "あなたは気をつけなければなりません。"],
            ["we / must / clean / room / the / .", "We must clean the room.", "私たちは部屋を掃除しなければなりません。"],
            ["must / they / study / English / .", "They must study English.", "彼らは英語を勉強しなければなりません。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
