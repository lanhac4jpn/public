    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["the / who / man / teaches / English / works / at / this / school / .", "The man who teaches English works at this school.", "英語を教えるその男性はこの学校で働いています。"],
            ["the / boy / soccer / likes / who / lives / in / Osaka / .", "The boy who likes soccer lives in Osaka.", "サッカーが好きなその少年は大阪に住んでいます。"],
            ["helps / who / the / girl / often / her / mother / studies / math / .", "The girl who helps her mother often studies math.", "お母さんをよく手伝うその女の子は数学を勉強します。"],
            ["sings / the / well / woman / who / lives / near / here / .", "The woman who sings well lives near here.", "歌が上手なその女性はこの近くに住んでいます。"],
            ["the / who / book / reads / boy / writes / in / English / a / diary / .", "The boy who reads a book writes a diary in English.", "本を読むその少年は英語で日記を書きます。"],
            ["the / cooks / girl / dinner / goes / who / to / this / school / .", "The girl who cooks dinner goes to this school.", "夕食を作るその女の子はこの学校に通っています。"],
            ["writes / the / man / who / many / letters / works / in / an / office / .", "The man who writes many letters works in an office.", "たくさん手紙を書くその男性はオフィスで働いています。"],
            ["the / teacher / who / teaches / math / speaks / also / English / well / .", "The teacher who teaches math also speaks English well.", "数学を教えるその先生は英語も上手に話します。"],
            ["the / who / piano / girl / plays / often / visits / her / grandmother / .", "The girl who plays the piano often visits her grandmother.", "ピアノを弾くその女の子はよくおばあさんを訪ねます。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
