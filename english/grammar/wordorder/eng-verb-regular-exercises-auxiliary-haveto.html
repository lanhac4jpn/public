<body class="container mt-5">

    <!-- タイトル -->
    <?php include 'eng-inc-close-btn.html'; ?>
    <h1 class="title">助動詞表現 have to 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["homework / have / to / I / do / my / .", "I have to do my homework.", "私は宿題をしなければなりません。"],
            ["I / go / to / have / the / to / library / .", "I have to go to the library.", "私は図書館に行かなければなりません。"],
            ["have / you / to / study / English / .", "You have to study English.", "あなたは英語を勉強しなければなりません。"],
            ["help / parents / you / your / to / have / .", "You have to help your parents.", "あなたは両親を手伝わなければなりません。"],
            ["he / has / school / go / to / to / .", "He has to go to school.", "彼は学校に行かなければなりません。"],
            ["medicine / he / take / has / his / to / .", "He has to take his medicine.", "彼は薬を飲まなければなりません。"],
            ["you / early / up / have / to / get / .", "You have to get up early.", "あなたは早起きしなければなりません。"],
            ["clean / have / we / to / room / the / .", "We have to clean the room.", "私たちは部屋を掃除しなければなりません。"],
            ["have / to / they / practice / baseball / .", "They have to practice baseball.", "彼らは野球を練習しなければなりません。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
