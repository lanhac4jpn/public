    <h1 class="title">未来進行形 否定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["tomorrow / studying / at / not / I / the / be / will / library / .", "I will not be studying at the library tomorrow.", "私は明日図書館で勉強していないでしょう。"],
            ["at / be / dinner / 7 / she / not / will / cooking / .", "She will not be cooking dinner at 7.", "彼女は7時に夕食を作っていないでしょう。"],
            ["meeting / the / will / not / attending / be / they / tomorrow / .", "They will not be attending the meeting tomorrow.", "彼らは明日会議に出席していないでしょう。"],
            ["be / soccer / playing / not / park / will / he / the / in / .", "He will not be playing soccer in the park.", "彼は公園でサッカーをしていないでしょう。"],
            ["abroad / will / traveling / not / be / year / we / next / .", "We will not be traveling abroad next year.", "私たちは来年海外を旅行していないでしょう。"],
            ["be / not / I / the / tonight / watching / movie / will / .", "I will not be watching the movie tonight.", "私は今夜その映画を観ていないでしょう。"],
            ["your / using / will / be / you / not / computer / .", "You will not be using your computer.", "あなたは自分のパソコンを使っていないでしょう。"],
            ["garden / working / will / he / not / be / in / the / .", "He will not be working in the garden.", "彼は庭で働いていないでしょう。"],
            ["children / school / studying / not / the / will / be / at / .", "The children will not be studying at school.", "子どもたちは学校で勉強していないでしょう。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
