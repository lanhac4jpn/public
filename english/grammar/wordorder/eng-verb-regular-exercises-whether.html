<body class="container mt-5">

    <!-- タイトル -->
    <?php include 'eng-inc-close-btn.html'; ?>
    <h1 class="title">whether 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["know / I / whether / true / story / the / is / .", "I know whether the story is true.", "私はその話が本当かどうか知っています。"],
            ["asked / she / whether / he / busy / was / .", "She asked whether he was busy.", "彼女は彼が忙しいかどうか尋ねました。"],
            ["decide / we / whether / go / to / will / tomorrow / .", "We will decide whether to go tomorrow.", "私たちは明日行くかどうか決めます。"],
            ["not / sure / whether / I / he / come / will / am / .", "I am not sure whether he will come.", "私は彼が来るかどうか確かではありません。"],
            ["knew / whether / she / at / home / was / I / .", "I knew whether she was at home.", "私は彼女が家にいるかどうか知っていました。"],
            ["teacher / asked / the / whether / ready / were / we / .", "The teacher asked whether we were ready.", "先生は私たちが準備できているかどうか尋ねました。"],
            ["not / remember / he / whether / locked / the / door / did / .", "He did not remember whether he locked the door.", "彼はドアに鍵をかけたかどうか覚えていませんでした。"],
            ["decide / whether / to / join / she / the / club / will / .", "She will decide whether to join the club.", "彼女はクラブに入るかどうか決めるでしょう。"],
            ["wondered / they / whether / true / news / the / was / .", "They wondered whether the news was true.", "彼らはそのニュースが本当かどうか不思議に思いました。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
