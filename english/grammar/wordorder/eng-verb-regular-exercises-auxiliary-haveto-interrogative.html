<head>

<body class="container mt-5">

    <!-- タイトル -->
    <?php include 'eng-inc-close-btn.html'; ?>
    <h1 class="title">助動詞表現 have to 疑問文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["have / I / to / do / my / homework / ?", "Do I have to do my homework?", "私は宿題をしなければなりませんか。"],
            ["to / do / I / have / go / school / to / ?", "Do I have to go to school?", "私は学校に行かなければなりませんか。"],
            ["English / you / do / have / to / study / ?", "Do you have to study English?", "あなたは英語を勉強しなければなりませんか。"],
            ["to / help / parents / do / have / your / you / ?", "Do you have to help your parents?", "あなたは両親を手伝わなければなりませんか。"],
            ["have / to / he / does / go / school / to / ?", "Does he have to go to school?", "彼は学校に行かなければなりませんか。"],
            ["medicine / have / does / take / he / his / to / ?", "Does he have to take his medicine?", "彼は薬を飲まなければなりませんか。"],
            ["get / early / you / do / to / up / have / ?", "Do you have to get up early?", "あなたは早起きしなければなりませんか。"],
            ["have / to / we / clean / do / the / room / ?", "Do we have to clean the room?", "私たちは部屋を掃除しなければなりませんか。"],
            ["practice / they / to / have / do / baseball / ?", "Do they have to practice baseball?", "彼らは野球を練習しなければなりませんか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
