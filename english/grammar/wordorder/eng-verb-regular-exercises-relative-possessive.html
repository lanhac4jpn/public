<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>関係代名詞・所有格 肯定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">関係代名詞・所有格 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-relative-possessive.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["the / man / whose / car / is / new / my / is / teacher / .", "The man whose car is new is my teacher.", "車が新しいその男性は私の先生です。"],
            ["is / girl / the / whose / father / doctor / a / is / Mary / .", "The girl whose father is a doctor is Mary.", "父が医者であるその女の子はメアリーです。"],
            ["the / whose / dog / boy / is / fast / Ken / is / .", "The boy whose dog is fast is Ken.", "犬が速いその少年はケンです。"],
            ["student / whose / English / is / good / that / Tom / is / .", "The student whose English is good is Tom.", "英語が得意なその生徒はトムです。"],
            ["is / woman / house / the / is / big / whose / very / .", "The woman whose house is very big is rich.", "家がとても大きいその女性は裕福です。"],
            ["whose / mother / teacher / the / is / kind / girl / is / a / .", "The girl whose mother is a teacher is kind.", "母が先生であるその女の子は優しいです。"],
            ["the / boy / whose / brother / famous / singer / a / is / is / Paul / .", "The boy whose brother is a famous singer is Paul.", "兄が有名な歌手であるその少年はポールです。"],
            ["whose / father / works / the / at / factory / man / is / this / a / .", "This is the man whose father works at a factory.", "父が工場で働いているその男性はこの人です。"],
            ["the / whose / painting / girl / is / beautiful / Emi / is / .", "The girl whose painting is beautiful is Emi.", "絵が美しいその女の子はエミです。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
