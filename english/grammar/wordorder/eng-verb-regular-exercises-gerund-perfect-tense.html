<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動名詞 肯定文 完了形 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">動名詞 肯定文 完了形 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-auxiliary-could-negative.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["having / he / admitted / window / the / broken / .", "He admitted having broken the window.", "彼は窓を壊したことを認めました。"],
            ["remembered / Kyoto / she / having / visited / .", "She remembered having visited Kyoto.", "彼女は京都を訪れたことを覚えていました。"],
            ["having / they / enjoyed / party / the / .", "They enjoyed having joined the party.", "彼らはそのパーティーに参加したことを楽しみました。"],
            ["apologized / having / I / said / for / that / .", "I apologized for having said that.", "私はそんなことを言ったことを謝りました。"],
            ["having / finished / homework / his / he / was / proud / of / .", "He was proud of having finished his homework.", "彼は宿題を終えたことを誇りに思いました。"],
            ["having / helped / glad / she / was / him / .", "She was glad of having helped him.", "彼女は彼を助けたことをうれしく思いました。"],
            ["having / forgotten / she / regretted / promise / the / .", "She regretted having forgotten the promise.", "彼女はその約束を忘れたことを後悔しました。"],
            ["having / met / teacher / English / our / we / happy / were / .", "We were happy about having met our English teacher.", "私たちは英語の先生に会ったことをうれしく思いました。"],
            ["having / lied / regretted / he / to / friends / his / .", "He regretted having lied to his friends.", "彼は友達に嘘をついたことを後悔しました。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
