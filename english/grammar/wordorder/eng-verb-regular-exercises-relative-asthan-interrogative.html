    <h1 class="title">関係代名詞 as/than 疑問文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["the / same / book / have / as / you / is / this / ?", "Is this the same book as you have?", "これはあなたが持っているのと同じ本ですか。"],
            ["such / a / kind / is / he / as / everyone / likes / boy / ?", "Is he such a kind boy as everyone likes?", "彼は誰からも好かれるような親切な少年ですか。"],
            ["the / same / mistake / you / as / did / make / I / ?", "Did you make the same mistake as I did?", "あなたは私がしたのと同じ間違いをしましたか。"],
            ["such / things / likes / she / are / as / these / ?", "Are these such things as she likes?", "これらは彼女が好きなようなものですか。"],
            ["the / same / pen / as / you / have / lost / she / has / ?", "Has she lost the same pen as you have?", "彼女はあなたが持っているのと同じペンをなくしましたか。"],
            ["such / man / respects / everyone / a / as / is / he / ?", "Is he such a man as everyone respects?", "彼は誰からも尊敬されるような人ですか。"],
            ["different / you / have / than / I / do / opinion / a / ?", "Do you have a different opinion than I do?", "あなたは私とは違う意見を持っていますか。"],
            ["better / singer / she / than / is / thought / you / ?", "Is she a better singer than you thought?", "彼女はあなたが思っていたより良い歌手ですか。"],
            ["the / same / story / as / told / did / I / he / ?", "Did he tell the same story as I did?", "彼は私が話したのと同じ話をしましたか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
