<body class="container mt-5">

    <!-- タイトル -->
    <?php include 'eng-inc-close-btn.html'; ?>
    <h1 class="title">過去進行形 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["yesterday / I / was / reading / book / a / .", "I was reading a book yesterday.", "私は昨日本を読んでいました。"],
            ["was / letter / writing / I / a / .", "I was writing a letter.", "私は手紙を書いていました。"],
            ["you / English / studying / yesterday / were / .", "You were studying English yesterday.", "あなたは昨日英語を勉強していました。"],
            ["soccer / were / you / playing / .", "You were playing soccer.", "あなたはサッカーをしていました。"],
            ["he / a / was / movie / watching / .", "He was watching a movie.", "彼は映画を見ていました。"],
            ["was / studying / he / English / .", "He was studying English.", "彼は英語を勉強していました。"],
            ["homework / doing / were / you / your / .", "You were doing your homework.", "あなたは宿題をしていました。"],
            ["were / lunch / having / we / .", "We were having lunch.", "私たちは昼食を食べていました。"],
            ["they / soccer / were / playing / .", "They were playing soccer.", "彼らはサッカーをしていました。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
