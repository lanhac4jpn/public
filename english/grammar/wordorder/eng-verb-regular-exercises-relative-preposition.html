    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["the / teacher / to / whom / spoke / I / is / kind / very / .", "The teacher to whom I spoke is very kind.", "私が話しかけた先生はとても親切です。"],
            ["the / girl / with / whom / playing / is / Ken / tennis / .", "The girl with whom Ken is playing tennis is Yumi.", "ケンがテニスをしているその女の子はユミです。"],
            ["the / man / for / whom / bought / this / present / is / my / uncle / .", "The man for whom I bought this present is my uncle.", "私がこのプレゼントを買ったその男性は私のおじです。"],
            ["the / chair / on / which / is / the / book / new / that / expensive / .", "The chair on which the new book is is expensive.", "新しい本が置いてあるその椅子は高価です。"],
            ["the / boy / to / whom / letter / a / wrote / she / is / Tom / .", "The boy to whom she wrote a letter is Tom.", "彼女が手紙を書いたその少年はトムです。"],
            ["the / city / in / which / we / stayed / beautiful / was / very / .", "The city in which we stayed was very beautiful.", "私たちが滞在したその町はとても美しかったです。"],
            ["the / woman / by / whom / painted / picture / this / was / famous / a / is / artist / .", "The woman by whom this picture was painted is a famous artist.", "この絵を描いたその女性は有名な芸術家です。"],
            ["the / box / from / which / took / out / the / he / toy / is / heavy / .", "The box from which he took out the toy is heavy.", "彼がおもちゃを取り出したその箱は重いです。"],
            ["the / time / during / which / festival / the / is / held / summer / exciting / very / .", "The time during which the festival is held is very exciting.", "その祭りが行われる時期はとてもわくわくします。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
