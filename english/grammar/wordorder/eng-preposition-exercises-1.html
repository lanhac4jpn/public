<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>前置詞 in/on/of/at</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <?php include 'eng-inc-close-btn.html'; ?>
    <h1 class="title">前置詞 in/on/of/at</h1>

    <!-- 単語の説明 -->
    <section class="mt-4">
        <h2>単語説明</h2>
        <ul>
            <li><strong>in:</strong>～の中に（空間の内部）</li>
            <li><strong>at:</strong>～に（点・場所・時間など）</li>
            <li><strong>on:</strong>～の上に（接している）</li>
            <li><strong>ofy:</strong>～の／～から成る（所有・部分）</li>
        </ul>
    </section>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["box / in / the / is / cat / the / .", "The cat is in the box.", "その猫は箱の中にいます。"],
            ["on / the / table / book / the / is / .", "The book is on the table.", "その本はテーブルの上にあります。"],
            ["the / picture / wall / on / is / the / .", "The picture is on the wall.", "その絵は壁に掛かっています。"],
            ["of / cup / a / tea / want / I / .", "I want a cup of tea.", "私は紅茶を一杯ほしいです。"],
            ["color / of / the / blue / is / sky / .", "The color of the sky is blue.", "空の色は青いです。"],
            ["at / 7 / starts / movie / the / .", "The movie starts at 7.", "映画は7時に始まります。"],
            ["park / in / we / are / the / .", "We are in the park.", "私たちは公園の中にいます。"],
            ["door / the / at / someone / is / .", "Someone is at the door.", "誰かがドアのところにいます。"],
            ["of / full / basket / is / the / apples / .", "The basket is full of apples.", "そのかごはりんごでいっぱいです。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
