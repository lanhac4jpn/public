<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>be・一般動詞 否定文 過去形</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">be・一般動詞 否定文 過去形</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-negative-past.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["yesterday / busy / not / I / was / .", "I was not busy yesterday.", "私は昨日忙しくありませんでした。"],
            ["a / did / not / I / letter / write / .", "I did not write a letter.", "私は手紙を書きませんでした。"],
            ["you / at / not / home / were / .", "You were not at home.", "あなたは家にいませんでした。"],
            ["not / see / movie / you / did / a / .", "You did not see a movie.", "あなたは映画を見ませんでした。"],
            ["he / not / park / in / the / was / .", "He was not in the park.", "彼は公園にいませんでした。"],
            ["study / not / did / he / English / .", "He did not study English.", "彼は英語を勉強しませんでした。"],
            ["were / yesterday / not / busy / you / .", "You were not busy yesterday.", "あなたは昨日忙しくありませんでした。"],
            ["classmates / were / not / we / good / .", "We were not good classmates.", "私たちはよいクラスメートではありませんでした。"],
            ["players / soccer / they / not / were / .", "They were not soccer players.", "彼らはサッカー選手ではありませんでした。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/AnswerAreaIns.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
