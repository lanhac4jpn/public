<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>助動詞 have 過去分詞 肯定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">助動詞 have 過去分詞肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-auxiliary-perfect-passive.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["helped / I / could / you / have / .", "I could have helped you.", "私はあなたを助けることができたのに。"],
            ["earlier / she / come / might / have / .", "She might have come earlier.", "彼女はもっと早く来たかもしれません。"],
            ["won / game / have / the / must / he / .", "He must have won the game.", "彼はその試合に勝ったに違いありません。"],
            ["forgotten / they / the / homework / have / may / .", "They may have forgotten the homework.", "彼らは宿題を忘れたかもしれません。"],
            ["the / train / missed / have / could / we / .", "We could have missed the train.", "私たちは電車に乗り遅れたかもしれません。"],
            ["phone / her / have / should / called / you / .", "You should have called her.", "あなたは彼女に電話すべきでした。"],
            ["late / been / might / I / have / .", "I might have been late.", "私は遅れたかもしれません。"],
            ["studied / more / he / have / must / .", "He must have studied more.", "彼はもっと勉強したに違いありません。"],
            ["won / could / game / have / they / the / .", "They could have won the game.", "彼らはその試合に勝てたのに。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
