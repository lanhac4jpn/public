    <h1 class="title">未来進行形 疑問文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["I / tomorrow / library / will / be / studying / at / the / ?", "Will I be studying at the library tomorrow?", "私は明日図書館で勉強しているでしょうか。"],
            ["she / dinner / will / cooking / be / at / 7 / ?", "Will she be cooking dinner at 7?", "彼女は7時に夕食を作っているでしょうか。"],
            ["tomorrow / attending / they / will / the / be / meeting / ?", "Will they be attending the meeting tomorrow?", "彼らは明日会議に出席しているでしょうか。"],
            ["the / soccer / park / he / in / will / be / playing / ?", "Will he be playing soccer in the park?", "彼は公園でサッカーをしているでしょうか。"],
            ["next / be / abroad / will / traveling / we / year / ?", "Will we be traveling abroad next year?", "私たちは来年海外を旅行しているでしょうか。"],
            ["movie / the / be / will / watching / I / tonight / ?", "Will I be watching the movie tonight?", "私は今夜その映画を観ているでしょうか。"],
            ["you / will / be / using / computer / your / ?", "Will you be using your computer?", "あなたは自分のパソコンを使っているでしょうか。"],
            ["garden / be / in / he / will / working / the / ?", "Will he be working in the garden?", "彼は庭で働いているでしょうか。"],
            ["school / studying / the / children / be / will / at / ?", "Will the children be studying at school?", "子どもたちは学校で勉強しているでしょうか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
