<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>助動詞 Can 肯定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">助動詞 Can 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-auxiliary-can.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["can / I / swim / fast / .", "I can swim fast.", "私は速く泳げます。"],
            ["I / sing / can / well / .", "I can sing well.", "私は上手に歌えます。"],
            ["speak / English / can / you / .", "You can speak English.", "あなたは英語を話せます。"],
            ["you / can / play / the / guitar / .", "You can play the guitar.", "あなたはギターを弾けます。"],
            ["he / can / run / fast / .", "He can run fast.", "彼は速く走れます。"],
            ["the / piano / play / he / can / .", "He can play the piano.", "彼はピアノを弾けます。"],
            ["help / today / you / can / me / .", "You can help me today.", "あなたは今日私を助けられます。"],
            ["we / can / swim / together / .", "We can swim together.", "私たちは一緒に泳げます。"],
            ["can / soccer / play / they / .", "They can play soccer.", "彼らはサッカーができます。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
