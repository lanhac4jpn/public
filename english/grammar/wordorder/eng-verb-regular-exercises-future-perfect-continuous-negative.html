<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来完了進行形 否定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">未来完了進行形 否定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-future-perfect-continuous-negative.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["not / I / will / been / have / studying / for / hours / three / .", "I will not have been studying for three hours.", "私は3時間勉強していないことになるでしょう。"],
            ["working / she / all / have / been / not / will / day / .", "She will not have been working all day.", "彼女は一日中働いていないことになるでしょう。"],
            ["for / been / they / will / not / playing / two / have / hours / soccer / .", "They will not have been playing soccer for two hours.", "彼らは2時間サッカーをしていないことになるでしょう。"],
            ["been / waiting / minutes / will / thirty / have / not / we / been / .", "We will not have been waiting for thirty minutes.", "私たちは30分待っていないことになるでしょう。"],
            ["this / city / five / years / not / been / living / he / have / for / will / .", "He will not have been living in this city for five years.", "彼はこの街に5年間住んでいないことになるでしょう。"],
            ["for / English / hours / studying / not / I / have / two / been / will / .", "I will not have been studying English for two hours.", "私は2時間英語を勉強していないことになるでしょう。"],
            ["been / will / she / not / teaching / ten / years / have / for / .", "She will not have been teaching for ten years.", "彼女は10年間教えていないことになるでしょう。"],
            ["have / three / been / not / traveling / for / will / they / months / .", "They will not have been traveling for three months.", "彼らは3か月間旅行していないことになるでしょう。"],
            ["not / been / talking / have / for / we / will / been / two / hours / .", "We will not have been talking for two hours.", "私たちは2時間話していないことになるでしょう。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
