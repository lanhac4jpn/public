    <link href="css/style.css" rel="stylesheet">

<body class="container mt-5">

    <!-- タイトル -->
    <?php include 'eng-inc-close-btn.html'; ?>
    <h1 class="title">助動詞 may/might/would 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["tired / he / be / may / well / .", "He may well be tired.", "彼が疲れているのももっともです。"],
            ["rain / it / tomorrow / may / well / .", "It may well rain tomorrow.", "明日は雨が降るでしょう。"],
            ["go / as / might / home / you / well / .", "You might as well go home.", "あなたは家に帰ったほうがいいです。"],
            ["leave / we / as / might / now / well / .", "We might as well leave now.", "私たちは今出発したほうがいいです。"],
            ["would / stay / I / rather / home / .", "I would rather stay home.", "私はむしろ家にいたいです。"],
            ["go / rather / would / I / than / there / .", "I would rather go than stay there.", "私はそこにいるより行きたいです。"],
            ["study / may / English / well / you / hard / .", "You may well study English hard.", "あなたが英語を一生懸命勉強するのももっともです。"],
            ["might / as / help / your / you / friend / well / .", "You might as well help your friend.", "あなたは友達を助けたほうがいいです。"],
            ["coffee / drink / rather / I / would / tea / than / .", "I would rather drink coffee than tea.", "私はお茶よりコーヒーを飲みたいです。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
