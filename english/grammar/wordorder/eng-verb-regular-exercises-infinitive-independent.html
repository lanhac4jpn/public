<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不定詞 独立不定詞 肯定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">不定詞 独立不定詞 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-infinitive-independent.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["to / honest / be / I / am / busy / today / .", "To be honest, I am busy today.", "正直に言うと、私は今日は忙しいです。"],
            ["happy / am / to / I / meet / you / .", "I am happy to meet you.", "あなたに会えてうれしいです。"],
            ["surprise / my / to / she / passed / exam / the / .", "To my surprise, she passed the exam.", "驚いたことに、彼女は試験に合格しました。"],
            ["the / begin / to / story / with / is / long / .", "To begin with, the story is long.", "まず第一に、その話は長いです。"],
            ["make / worse / matters / to / it / rained / .", "To make matters worse, it rained.", "さらに悪いことに、雨が降りました。"],
            ["tell / to / the / truth / am / I / tired / .", "To tell the truth, I am tired.", "本当のことを言うと、私は疲れています。"],
            ["honest / to / be / he / late / was / .", "To be honest, he was late.", "正直に言うと、彼は遅れました。"],
            ["surprise / to / my / it / easy / was / test / the / .", "To my surprise, the test was easy.", "驚いたことに、そのテストは簡単でした。"],
            ["begin / with / to / first / the / problem / is / time / .", "To begin with, the first problem is time.", "まず第一に、最初の問題は時間です。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
