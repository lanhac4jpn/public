<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>受け身現在完了形 肯定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">受け身現在完了形 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-passive-present-perfect.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["this / book / has / been / read / many / people / by / .", "This book has been read by many people.", "この本は多くの人に読まれています。"],
            ["the / has / been / cleaned / classroom / already / .", "The classroom has already been cleaned.", "その教室はすでに掃除されています。"],
            ["my / has / been / homework / finished / just / .", "My homework has just been finished.", "私の宿題はちょうど終わったところです。"],
            ["songs / have / been / sung / children / the / by / .", "The songs have been sung by the children.", "その歌は子どもたちによって歌われてきました。"],
            ["has / been / built / bridge / the / new / .", "The new bridge has been built.", "新しい橋が建設されました。"],
            ["has / been / used / bike / his / many / times / .", "His bike has been used many times.", "彼の自転車は何度も使われています。"],
            ["letters / have / been / written / students / the / by / .", "The letters have been written by the students.", "その手紙は生徒たちによって書かれました。"],
            ["the / has / been / opened / door / just / .", "The door has just been opened.", "そのドアはちょうど開けられたところです。"],
            ["English / has / been / spoken / here / long / for / time / a / .", "English has been spoken here for a long time.", "英語はここで長い間話されています。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
