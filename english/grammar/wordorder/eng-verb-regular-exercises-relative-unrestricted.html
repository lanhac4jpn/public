    <h1 class="title">関係代名詞非制限用法 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["my / brother / , / who / lives / in / Osaka / , / is / a / doctor / .", "My brother, who lives in Osaka, is a doctor.", "私の兄は大阪に住んでいますが、医者です。"],
            ["this / book / , / which / was / written / by / my / teacher / , / is / very / interesting / .", "This book, which was written by my teacher, is very interesting.", "この本は私の先生によって書かれましたが、とても面白いです。"],
            ["Mr / Smith / , / who / teaches / us / math / , / is / very / kind / .", "Mr. Smith, who teaches us math, is very kind.", "私たちに数学を教えているスミス先生はとても親切です。"],
            ["Kyoto / , / which / is / famous / for / its / temples / , / is / popular / with / tourists / .", "Kyoto, which is famous for its temples, is popular with tourists.", "京都は寺で有名で、観光客に人気です。"],
            ["my / friend / , / whose / father / is / a / pilot / , / wants / to / be / a / pilot / too / .", "My friend, whose father is a pilot, wants to be a pilot too.", "父がパイロットである私の友達は、自分もパイロットになりたいと思っています。"],
            ["Paris / , / where / I / visited / last / year / , / is / a / beautiful / city / .", "Paris, where I visited last year, is a beautiful city.", "私が去年訪れたパリは美しい都市です。"],
            ["the / car / , / which / was / very / expensive / , / is / his / .", "The car, which was very expensive, is his.", "その車はとても高価でしたが、彼のものです。"],
            ["my / sister / , / who / is / good / at / piano / , / won / a / prize / .", "My sister, who is good at piano, won a prize.", "ピアノが得意な私の姉は賞を取りました。"],
            ["Mount / Fuji / , / which / is / the / highest / mountain / in / Japan / , / is / very / beautiful / .", "Mount Fuji, which is the highest mountain in Japan, is very beautiful.", "日本で一番高い山である富士山はとても美しいです。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
