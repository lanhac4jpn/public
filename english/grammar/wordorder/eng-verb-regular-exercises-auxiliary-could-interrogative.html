<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>助動詞 Could 疑問文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">助動詞 Could 疑問文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-auxiliary-could-interrogative.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["yesterday / swim / fast / I / could / ?", "Could I swim fast yesterday?", "私は昨日速く泳げましたか。"],
            ["well / sing / I / could / ?", "Could I sing well?", "私は上手に歌えましたか。"],
            ["English / you / speak / could / ?", "Could you speak English?", "あなたは英語を話せましたか。"],
            ["the / play / you / could / guitar / ?", "Could you play the guitar?", "あなたはギターを弾けましたか。"],
            ["he / could / run / fast / ?", "Could he run fast?", "彼は速く走れましたか。"],
            ["could / he / piano / play / the / ?", "Could he play the piano?", "彼はピアノを弾けましたか。"],
            ["help / today / me / you / could / ?", "Could you help me today?", "あなたは今日私を助けられましたか。"],
            ["together / go / we / could / ?", "Could we go together?", "私たちは一緒に行けましたか。"],
            ["they / could / soccer / play / ?", "Could they play soccer?", "彼らはサッカーができましたか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
