<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>be・一般動詞 疑問文 過去形</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">be・一般動詞 疑問文 過去形</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-interrogative-past.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["yesterday / I / was / first / ?", "Was I first yesterday?", "私は昨日一番でしたか。"],
            ["a / did / paass / exam / the / ?", "Did I pass the exam?", "私は試験に合格しましたか。"],
            ["at / were / you / home / yesterday / ?", "Were you at home yesterday?", "あなたは昨日家にいましたか。"],
            ["see / you / a / did / movie / ?", "Did you see a movie?", "あなたは映画を見ましたか。"],
            ["he / was / park / the / in / ?", "Was he in the park?", "彼は公園にいましたか。"],
            ["English / did / he / study / ?", "Did he study English?", "彼は英語を勉強しましたか。"],
            ["were / yesterday / you / busy / ?", "Were you busy yesterday?", "あなたは昨日忙しかったですか。"],
            ["good / were / classmates / we / ?", "Were we good classmates?", "私たちはよいクラスメートでしたか。"],
            ["soccer / were / they / players / ?", "Were they soccer players?", "彼らはサッカー選手でしたか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
