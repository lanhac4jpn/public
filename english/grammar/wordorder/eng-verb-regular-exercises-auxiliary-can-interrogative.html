    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["swim / I / can / fast / ?", "Can I swim fast?", "私は速く泳げますか。"],
            ["sing / I / can / well / ?", "Can I sing well?", "私は上手に歌えますか。"],
            ["you / English / speak / can / ?", "Can you speak English?", "あなたは英語を話せますか。"],
            ["the / you / play / guitar / can / ?", "Can you play the guitar?", "あなたはギターを弾けますか。"],
            ["he / run / can / fast / ?", "Can he run fast?", "彼は速く走れますか。"],
            ["he / can / play / piano / the / ?", "Can he play the piano?", "彼はピアノを弾けますか。"],
            ["today / help / me / can / you / ?", "Can you help me today?", "あなたは今日私を助けられますか。"],
            ["swim / together / can / we / ?", "Can we swim together?", "私たちは一緒に泳げますか。"],
            ["can / they / soccer / play / ?", "Can they play soccer?", "彼らはサッカーができますか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
