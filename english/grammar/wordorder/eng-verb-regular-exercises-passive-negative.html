<body class="container mt-5">

    <!-- タイトル -->
    <?php include 'eng-inc-close-btn.html'; ?>
    <h1 class="title">受け身 否定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["book / not / this / by / written / Mr / Smith / is / .", "This book is not written by Mr. Smith.", "この本はスミス先生によって書かれたのではありません。"],
            ["the / was / by / not / broken / window / ball / a / .", "The window was not broken by a ball.", "その窓はボールで壊されたのではありません。"],
            ["these / letters / students / not / by / written / are / the / .", "These letters are not written by the students.", "これらの手紙は生徒たちによって書かれたものではありません。"],
            ["English / Canada / spoken / in / not / is / .", "English is not spoken in Canada.", "カナダでは英語は話されていません。"],
            ["homework / yesterday / not / my / done / was / .", "My homework was not done yesterday.", "私の宿題は昨日終えられませんでした。"],
            ["the / cleaned / day / classroom / is / every / not / .", "The classroom is not cleaned every day.", "その教室は毎日掃除されているわけではありません。"],
            ["cake / mother / my / not / by / made / was / this / .", "This cake was not made by my mother.", "このケーキは私の母が作ったのではありません。"],
            ["songs / by / sung / these / children / not / the / are / .", "These songs are not sung by the children.", "これらの歌は子どもたちに歌われていません。"],
            ["bike / Ken / yesterday / the / not / by / was / used / .", "The bike was not used by Ken yesterday.", "その自転車は昨日ケンに使われませんでした。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
