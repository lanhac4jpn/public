    <h1 class="title">be・一般動詞 疑問文 三単現</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["he / is / student / a / ?", "Is he a student?", "彼は学生ですか。"],
            ["play / tennis / does / he / ?", "Does he play tennis?", "彼はテニスをしますか。"],
            ["English / does / she / study / ?", "Does she study English?", "彼女は英語を勉強しますか。"],
            ["it / run / does / fast / ?", "Does it run fast?", "それは速く走りますか。"],
            ["teacher / is / she / a / ?", "Is she a teacher?", "彼女は先生ですか。"],
            ["it / dog / is / cute / a / ?", "Is it a cute dog?", "それはかわいい犬ですか。"],
            ["does / play / the / he / piano / ?", "Does he play the piano?", "彼はピアノを弾きますか。"],
            ["sing / well / does / she / ?", "Does she sing well?", "彼女は歌が上手ですか。"],
            ["help / it / does / him/ ?", "Does it help him?", "それは彼を助けますか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
