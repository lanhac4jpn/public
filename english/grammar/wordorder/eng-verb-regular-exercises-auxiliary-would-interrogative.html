<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>助動詞 Would 疑問文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">助動詞 Would 疑問文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-auxiliary-would-interrogative.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["help / would / I / you / ?", "Would I help you?", "私はあなたを助けるでしょうか。"],
            ["go / would / I / there / ?", "Would I go there?", "私はそこに行くでしょうか。"],
            ["like / would / you / tea / ?", "Would you like tea?", "あなたはお茶が欲しいですか。"],
            ["help / would / you / me / ?", "Would you help me?", "あなたは私を助けてくれますか。"],
            ["play / would / he / soccer / ?", "Would he play soccer?", "彼はサッカーをするでしょうか。"],
            ["like / some / would / he / water / ?", "Would he like some water?", "彼は水が欲しいですか。"],
            ["come / would / you / with / me / ?", "Would you come with me?", "あなたは私と一緒に来ますか。"],
            ["we / would / go / there / ?", "Would we go there?", "私たちはそこへ行くでしょうか。"],
            ["travel / would / they / to / Canada / ?", "Would they travel to Canada?", "彼らはカナダへ旅行するでしょうか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
