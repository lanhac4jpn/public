<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前置詞 by/with/about/around</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">前置詞 by/with/about/around</h1>

    <!-- 単語の説明 -->
    <section class="mt-4">
        <h2>単語説明</h2>
        <ul>
            <li><strong>by:</strong>〜によって（行為者・手段）</li>
            <li><strong>with:</strong>〜で（道具・手段・一緒に）</li>
            <li><strong>about:</strong>〜について</li>
            <li><strong>around:</strong>〜の周りを／〜のあたりで</li>
        </ul>
    </section>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-preposition-exercises-2.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["written / book / the / by / was / author / famous / a / .", "The book was written by a famous author.", "その本は有名な作家によって書かれました。"],
            ["cut / knife / with / bread / a / I / the / .", "I cut the bread with a knife.", "私はナイフでパンを切りました。"],
            ["talked / about / she / movie / the / .", "She talked about the movie.", "彼女はその映画について話しました。"],
            ["walked / the / park / around / we / .", "We walked around the park.", "私たちは公園の周りを歩きました。"],
            ["the / painted / wall / by / was / Tom / .", "The wall was painted by Tom.", "その壁はトムによって塗られました。"],
            ["helped / he / me / with / homework / my / .", "He helped me with my homework.", "彼は私の宿題を手伝ってくれました。"],
            ["story / about / is / this / friendship / .", "This story is about friendship.", "この物語は友情についてです。"],
            ["children / playing / are / around / the / school / .", "The children are playing around the school.", "子どもたちは学校の周りで遊んでいます。"],
            ["with / she / writes / pen / a / .", "She writes with a pen.", "彼女はペンで書きます。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/AnswerAreaIns.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
