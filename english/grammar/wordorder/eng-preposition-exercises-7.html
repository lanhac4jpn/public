<!DOCTYPE html>

<head>

    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <?php include 'eng-inc-close-btn.html'; ?>
    <h1 class="title">前置詞 to</h1>

    <!-- 単語の説明 -->
    <section class="mt-4">
        <h2>単語説明</h2>
        <ul>
            <li><strong>to（方向・目的地）:</strong>「〜へ」「〜に」</li>
            <li><strong>to（相手）:</strong>「〜に（対して）」</li>
        </ul>
    </section>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["school / go / to / every / I / day / .", "I go to school every day.", "私は毎日学校へ行きます。"],
            ["letter / her / to / wrote / friend / she / a / .", "She wrote a letter to her friend.", "彼女は友達に手紙を書きました。"],
            ["to / the / he / goes / park / on / Sunday / .", "He goes to the park on Sunday.", "彼は日曜日に公園へ行きます。"],
            ["teacher / students / the / to / talk / .", "The students talk to the teacher.", "生徒たちは先生に話しかけます。"],
            ["to / Tokyo / went / we / yesterday / .", "We went to Tokyo yesterday.", "私たちは昨日東京へ行きました。"],
            ["gave / to / I / her / the / book / .", "I gave the book to her.", "私はその本を彼女に渡しました。"],
            ["to / dog / spoke / my / the / he / .", "He spoke to my dog.", "彼は私の犬に話しかけました。"],
            ["to / children / presents / Santa / gave / the / .", "Santa gave presents to the children.", "サンタは子どもたちにプレゼントをあげました。"],
            ["to / we / went / the / station / together / .", "We went to the station together.", "私たちはいっしょに駅へ行きました。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
