<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前置詞 in/on</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <?php include 'eng-inc-close-btn.html'; ?>
    <h1 class="title">前置詞 in/on</h1>

    <!-- 単語の説明 -->
    <section class="mt-4">
        <h2>単語説明</h2>
        <ul>
            <li><strong>in:</strong>～の中に（空間の内部）</li>
            <li><strong>on:</strong>～の／～から成る（所有・部分）</li>
        </ul>
    </section>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["is / cat / in / the / box / the / .", "The cat is in the box.", "その猫は箱の中にいます。"],
            ["in / the / live / we / city / .", "We live in the city.", "私たちは都市に住んでいます。"],
            ["in / bag / my / is / the / book / .", "My book is in the bag.", "私の本はかばんの中にあります。"],
            ["on / the / book / is / table / the / .", "The book is on the table.", "その本はテーブルの上にあります。"],
            ["on / the / picture / wall / is / the / .", "The picture is on the wall.", "その絵は壁に掛かっています。"],
            ["on / the / bed / is / cat / the / .", "The cat is on the bed.", "その猫はベッドの上にいます。"],
            ["in / the / park / are / children / the / .", "The children are in the park.", "子どもたちは公園の中にいます。"],
            ["is / apple / in / the / box / an / .", "An apple is in the box.", "りんごが箱の中にあります。"],
            ["on / chair / the / is / bag / my / .", "My bag is on the chair.", "私のかばんは椅子の上にあります。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
