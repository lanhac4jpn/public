    <h1 class="title">受け身助動詞 否定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["this / song / be / cannot / by / sung / her / .", "This song cannot be sung by her.", "この歌は彼女によって歌うことはできません。"],
            ["the / homework / today / not / be / must / done / .", "The homework must not be done today.", "その宿題は今日してはいけません。"],
            ["the / letter / not / be / will / tomorrow / sent / .", "The letter will not be sent tomorrow.", "その手紙は明日送られないでしょう。"],
            ["this / book / not / be / should / by / students / read / .", "This book should not be read by students.", "この本は生徒によって読むべきではありません。"],
            ["English / cannot / be / anywhere / spoken / .", "English cannot be spoken anywhere.", "英語はどこでも話せるわけではありません。"],
            ["new / a / not / will / be / school / built / soon / .", "A new school will not be built soon.", "新しい学校はすぐには建てられないでしょう。"],
            ["this / rule / not / be / must / broken / .", "This rule must not be broken.", "この規則は破られてはなりません。"],
            ["the / work / not / should / be / by / this / evening / finished / .", "The work should not be finished by this evening.", "その仕事は今晩までに終えるべきではありません。"],
            ["his / bike / not / be / can / anyone / used / by / .", "His bike cannot be used by anyone.", "彼の自転車は誰にも使われることはできません。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
