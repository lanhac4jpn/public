<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>関係代名詞・主格 肯定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">関係代名詞・主格 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-relative-pronouns.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["the / is / Mr. Smith / who / teaches / man / English / .", "The man who teaches English is Mr. Smith.", "英語を教えるその男性はスミス先生です。"],
            ["is / girl / plays / the / my / sister / tennis / who / .", "The girl who plays tennis is my sister.", "テニスをするその女の子は私の妹です。"],
            ["book / who / the / wrote / man / famous / is / that / .", "The man who wrote that book is famous.", "その本を書いた男性は有名です。"],
            ["the / lives / Ken / who / in / boy / is / Kyoto / .", "The boy who lives in Kyoto is Ken.", "京都に住んでいるその少年はケンです。"],
            ["who / is / sings / girl / Mary / the / well / .", "The girl who sings well is Mary.", "歌が上手なその女の子はメアリーです。"],
            ["the / likes / soccer / who / boy / Tom / is / .", "The boy who likes soccer is Tom.", "サッカーが好きなその少年はトムです。"],
            ["the / helps / father / who / kind / his / man / is / .", "The man who helps his father is kind.", "お父さんを助けるその男性は親切です。"],
            ["is / teaches / woman / Ms. Brown / math / the / who / .", "The woman who teaches math is Ms. Brown.", "数学を教えるその女性はブラウン先生です。"],
            ["the / is / who / speaks / my / friend / English / boy / .", "The boy who speaks English is my friend.", "英語を話すその少年は私の友達です。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
