<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>be・一般動詞 否定文 三単現</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">be・一般動詞 否定文 三単現</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-negative-three.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["he / not / is / busy / .", "He is not busy.", "彼は忙しくありません。"],
            ["play / baseball / does / not / he / .", "He does not play baseball.", "彼は野球をしません。"],
            ["not / she / like / does / coffee / .", "She does not like coffee.", "彼女はコーヒーが好きではありません。"],
            ["eat / not / fish / does / it / .", "It does not eat fish.", "それは魚を食べません。"],
            ["not / is / tall / she / .", "She is not tall.", "彼女は背が高くありません。"],
            ["cute / dog / is / not / it / .", "It is not a cute dog.", "それはかわいい犬ではありません。"],
            ["does / study / not / English / he / .", "He does not study English.", "彼は英語を勉強しません。"],
            ["not / sing / she / does / well / .", "She does not sing well.", "彼女は上手に歌いません。"],
            ["it / help / does / not / him / .", "It does not help him.", "それは彼を助けません。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/AnswerAreaIns.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
