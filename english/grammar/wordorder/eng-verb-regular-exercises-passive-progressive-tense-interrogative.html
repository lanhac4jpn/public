<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>受け身進行形 疑問文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">受け身進行形 疑問文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-auxiliary-could-negative.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["being / is / now / washed / car / the / ?", "Is the car being washed now?", "その車はいま洗われているところですか。"],
            ["my / homework / being / at / the / done / is / moment / ?", "Is my homework being done at the moment?", "私の宿題はいまやっているところですか。"],
            ["new / bridge / built / the / being / is / ?", "Is the new bridge being built?", "その新しい橋はいま建設されているところですか。"],
            ["room / the / cleaned / right / now / being / is / ?", "Is the room being cleaned right now?", "その部屋はいま掃除されているところですか。"],
            ["letters / being / written / students / the / by / are / ?", "Are the letters being written by the students?", "その手紙はいま生徒たちによって書かれているところですか。"],
            ["song / the / sung / her / by / being / is / ?", "Is the song being sung by her?", "その歌はいま彼女によって歌われているところですか。"],
            ["house / painted / our / now / being / is / ?", "Is our house being painted now?", "私たちの家はいま塗装されているところですか。"],
            ["English / spoken / this / being / in / is / class / ?", "Is English being spoken in this class?", "英語はいまこのクラスで話されていますか。"],
            ["dinner / the / in / being / prepared / is / kitchen / the / ?", "Is the dinner being prepared in the kitchen?", "夕食はいま台所で準備されていますか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
