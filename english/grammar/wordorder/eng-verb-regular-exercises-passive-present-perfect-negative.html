<body class="container mt-5">

    <!-- タイトル -->
    <?php include 'eng-inc-close-btn.html'; ?>
    <h1 class="title">受け身現在完了形 否定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["this / book / not / has / been / read / yet / .", "This book has not been read yet.", "この本はまだ読まれていません。"],
            ["the / classroom / not / has / cleaned / been / today / .", "The classroom has not been cleaned today.", "その教室は今日掃除されていません。"],
            ["my / homework / not / has / been / finished / .", "My homework has not been finished.", "私の宿題はまだ終わっていません。"],
            ["songs / not / have / been / sung / the / children / by / .", "The songs have not been sung by the children.", "その歌は子どもたちに歌われていません。"],
            ["the / new / bridge / not / has / been / built / .", "The new bridge has not been built.", "その新しい橋は建設されていません。"],
            ["his / bike / not / been / has / used / often / .", "His bike has not been used often.", "彼の自転車はあまり使われていません。"],
            ["letters / have / not / been / written / students / by / the / .", "The letters have not been written by the students.", "その手紙は生徒たちによって書かれていません。"],
            ["the / door / has / not / been / opened / yet / .", "The door has not been opened yet.", "そのドアはまだ開けられていません。"],
            ["English / has / not / been / spoken / here / long / for / time / a / .", "English has not been spoken here for a long time.", "ここでは長い間英語は話されていません。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
