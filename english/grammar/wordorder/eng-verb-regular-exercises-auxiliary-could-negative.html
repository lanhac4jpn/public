    <h1 class="title">助動詞 Could 否定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["yesterday / could / I / not / swim / fast / .", "I could not swim fast yesterday.", "私は昨日速く泳げませんでした。"],
            ["sing / not / I / well / could / .", "I could not sing well.", "私は上手に歌えませんでした。"],
            ["English / you / speak / not / could / .", "You could not speak English.", "あなたは英語を話せませんでした。"],
            ["the / guitar / not / you / could / play / .", "You could not play the guitar.", "あなたはギターを弾けませんでした。"],
            ["he / could / run / not / fast / .", "He could not run fast.", "彼は速く走れませんでした。"],
            ["not / could / he / piano / the / play / .", "He could not play the piano.", "彼はピアノを弾けませんでした。"],
            ["help / today / could / me / not / you / .", "You could not help me today.", "あなたは今日私を助けられませんでした。"],
            ["together / not / go / we / could / .", "We could not go together.", "私たちは一緒に行けませんでした。"],
            ["they / could / soccer / play / not / .", "They could not play soccer.", "彼らはサッカーができませんでした。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
