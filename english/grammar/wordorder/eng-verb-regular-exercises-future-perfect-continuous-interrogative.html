    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["I / studying / been / have / will / hours / three / for / be / ?", "Will I have been studying for three hours?", "私は3時間勉強していることになるでしょうか。"],
            ["working / all / she / been / have / will / be / day / ?", "Will she have been working all day?", "彼女は一日中働いていることになるでしょうか。"],
            ["been / playing / they / have / soccer / two / for / will / hours / be / ?", "Will they have been playing soccer for two hours?", "彼らは2時間サッカーをしていることになるでしょうか。"],
            ["waiting / thirty / we / minutes / will / have / be / for / been / ?", "Will we have been waiting for thirty minutes?", "私たちは30分待っていることになるでしょうか。"],
            ["been / city / have / five / he / in / years / living / this / will / be / for / ?", "Will he have been living in this city for five years?", "彼はこの街に5年間住んでいることになるでしょうか。"],
            ["English / studying / been / will / I / have / two / for / hours / be / ?", "Will I have been studying English for two hours?", "私は2時間英語を勉強していることになるでしょうか。"],
            ["she / years / teaching / ten / have / been / for / be / will / ?", "Will she have been teaching for ten years?", "彼女は10年間教えていることになるでしょうか。"],
            ["been / for / will / three / they / traveling / have / be / months / ?", "Will they have been traveling for three months?", "彼らは3か月間旅行していることになるでしょうか。"],
            ["been / will / have / two / for / hours / we / talking / be / ?", "Will we have been talking for two hours?", "私たちは2時間話していることになるでしょうか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
