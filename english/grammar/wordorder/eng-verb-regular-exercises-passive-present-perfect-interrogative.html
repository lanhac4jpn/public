<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>受け身現在完了形 疑問文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">受け身現在完了形 疑問文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-passive-present-perfect-interrogative.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["been / has / read / book / this / by / many / people / ?", "Has this book been read by many people?", "この本は多くの人に読まれたことがありますか。"],
            ["cleaned / has / been / already / classroom / the / ?", "Has the classroom been cleaned already?", "その教室はもう掃除されましたか。"],
            ["been / finished / my / homework / has / ?", "Has my homework been finished?", "私の宿題は終わりましたか。"],
            ["songs / been / the / have / sung / by / children / the / ?", "Have the songs been sung by the children?", "その歌は子どもたちに歌われましたか。"],
            ["bridge / built / has / been / new / the / ?", "Has the new bridge been built?", "その新しい橋は建設されましたか。"],
            ["bike / used / times / been / many / his / has / ?", "Has his bike been used many times?", "彼の自転車は何度も使われましたか。"],
            ["been / letters / written / have / by / students / the / ?", "Have the letters been written by the students?", "その手紙は生徒たちによって書かれましたか。"],
            ["been / opened / door / the / just / has / ?", "Has the door just been opened?", "そのドアはちょうど開けられましたか。"],
            ["spoken / English / here / been / long / for / time / has / a / ?", "Has English been spoken here for a long time?", "ここでは長い間英語が話されていますか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
