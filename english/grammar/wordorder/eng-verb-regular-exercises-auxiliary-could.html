    <h1 class="title">助動詞 Could 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["yesterday / could / swim / I / fast / .", "I could swim fast yesterday.", "私は昨日速く泳げました。"],
            ["sing / I / could / well / .", "I could sing well.", "私は上手に歌えました。"],
            ["English / you / speak / could / .", "You could speak English.", "あなたは英語を話せました。"],
            ["play / could / the / you / guitar / .", "You could play the guitar.", "あなたはギターを弾けました。"],
            ["he / could / run / fast / .", "He could run fast.", "彼は速く走れました。"],
            ["play / he / piano / could / the / .", "He could play the piano.", "彼はピアノを弾けました。"],
            ["help / today / could / you / me / .", "You could help me today.", "あなたは今日私を助けることができました。"],
            ["together / could / we / go / .", "We could go together.", "私たちは一緒に行けました。"],
            ["they / soccer / could / play / .", "They could play soccer.", "彼らはサッカーができました。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
