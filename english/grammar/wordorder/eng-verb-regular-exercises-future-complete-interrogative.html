    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["finished / will / homework / my / I / have / ?", "Will I have finished my homework?", "私は宿題を終えているでしょうか。"],
            ["the / will / have / book / she / read / ?", "Will she have read the book?", "彼女はその本を読み終えているでしょうか。"],
            ["we / have / will / eaten / lunch / ?", "Will we have eaten lunch?", "私たちは昼食を食べ終えているでしょうか。"],
            ["done / homework / have / will / he / his / ?", "Will he have done his homework?", "彼は宿題を終えているでしょうか。"],
            ["they / have / house / a / built / will / ?", "Will they have built a house?", "彼らは家を建て終えているでしょうか。"],
            ["at / I / have / school / will / arrived / ?", "Will I have arrived at school?", "私は学校に到着しているでしょうか。"],
            ["movie / have / it / will / started / the / ?", "Will it have started the movie?", "映画は始まっているでしょうか。"],
            ["visited / city / have / the / will / you / ?", "Will you have visited the city?", "あなたはその街を訪れているでしょうか。"],
            ["we / have / will / by / then / dinner / finished / ?", "Will we have finished dinner by then?", "そのときまでに私たちは夕食を終えているでしょうか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
