<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>過去形進行形 疑問文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">過去形進行形 疑問文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-past-tense-interrogative.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["yesterday / was / studying / I / ?", "Was I studying yesterday?", "私は昨日勉強していましたか。"],
            ["a / was / writing / letter / I / ?", "Was I writing a letter?", "私は手紙を書いていましたか。"],
            ["you / English / yesterday / were / studying / ?", "Were you studying English yesterday?", "あなたは昨日英語を勉強していましたか。"],
            ["playing / soccer / were / you / ?", "Were you playing soccer?", "あなたはサッカーをしていましたか。"],
            ["movie / a / watching / he / was / ?", "Was he watching a movie?", "彼は映画を見ていましたか。"],
            ["was / he / homework / his / doing / ?", "Was he doing his homework?", "彼は宿題をしていましたか。"],
            ["yesterday / were / you / busy / ?", "Were you busy yesterday?", "あなたは昨日忙しかったですか。"],
            ["lunch / we / having / were / ?", "Were we having lunch?", "私たちは昼食を食べていましたか。"],
            ["they / were / soccer / playing / ?", "Were they playing soccer?", "彼らはサッカーをしていましたか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
