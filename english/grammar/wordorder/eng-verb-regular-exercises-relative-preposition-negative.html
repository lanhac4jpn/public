    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["the / teacher / to / whom / spoke / not / is / kind / very / I / .", "The teacher to whom I spoke is not very kind.", "私が話しかけた先生はとても親切ではありません。"],
            ["the / girl / with / whom / tennis / playing / is / not / Ken / Yumi / .", "The girl with whom Ken is playing tennis is not Yumi.", "ケンがテニスをしているその女の子はユミではありません。"],
            ["the / man / for / whom / present / a / bought / not / is / my / this / uncle / .", "The man for whom I bought this present is not my uncle.", "私がこのプレゼントを買ったその男性は私のおじではありません。"],
            ["the / chair / on / which / book / the / not / is / expensive / new / is / .", "The chair on which the new book is is not expensive.", "新しい本が置いてあるその椅子は高価ではありません。"],
            ["the / boy / to / whom / letter / a / not / is / wrote / she / Tom / .", "The boy to whom she wrote a letter is not Tom.", "彼女が手紙を書いたその少年はトムではありません。"],
            ["the / city / in / which / stayed / we / beautiful / was / not / .", "The city in which we stayed was not beautiful.", "私たちが滞在したその町は美しくありませんでした。"],
            ["the / woman / by / whom / picture / painted / was / this / not / artist / is / famous / a / .", "The woman by whom this picture was painted is not a famous artist.", "この絵を描いたその女性は有名な芸術家ではありません。"],
            ["the / box / from / which / out / toy / the / not / took / is / he / heavy / .", "The box from which he took out the toy is not heavy.", "彼がおもちゃを取り出したその箱は重くありません。"],
            ["the / time / during / which / festival / not / was / exciting / the / held / is / .", "The time during which the festival is held was not exciting.", "その祭りが行われる時期はわくわくするものではありませんでした。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
