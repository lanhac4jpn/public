<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>形式主語 肯定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">形式主語 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-auxiliary-could-negative.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["to / important / is / study / it / English / .", "It is important to study English.", "英語を勉強することは大切です。"],
            ["to / easy / it / is / read / this / book / .", "It is easy to read this book.", "この本を読むことは簡単です。"],
            ["fun / play / is / soccer / it / to / .", "It is fun to play soccer.", "サッカーをすることは楽しいです。"],
            ["to / necessary / it / go / is / school / to / .", "It is necessary to go to school.", "学校に行くことは必要です。"],
            ["speak / is / to / difficult / English / it / .", "It is difficult to speak English.", "英語を話すことは難しいです。"],
            ["dangerous / is / climb / it / to / the / mountain / .", "It is dangerous to climb the mountain.", "その山に登ることは危険です。"],
            ["interesting / is / to / it / learn / history / .", "It is interesting to learn history.", "歴史を学ぶことは面白いです。"],
            ["important / get / it / is / to / enough / sleep / .", "It is important to get enough sleep.", "十分な睡眠をとることは大切です。"],
            ["it / practice / necessary / is / to / every / day / .", "It is necessary to practice every day.", "毎日練習することは必要です。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
