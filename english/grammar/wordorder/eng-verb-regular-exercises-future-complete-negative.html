<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来完了 否定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">未来完了 否定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-future-complete-negative.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["finished / will / homework / not / have / I / my / .", "I will not have finished my homework.", "私は宿題を終えていないでしょう。"],
            ["the / not / will / she / read / have / book / .", "She will not have read the book.", "彼女はその本を読み終えていないでしょう。"],
            ["have / lunch / eaten / we / will / not / .", "We will not have eaten lunch.", "私たちは昼食を食べ終えていないでしょう。"],
            ["done / will / not / homework / he / have / his / .", "He will not have done his homework.", "彼は宿題を終えていないでしょう。"],
            ["house / built / have / not / a / will / they / .", "They will not have built a house.", "彼らは家を建て終えていないでしょう。"],
            ["arrived / not / I / school / will / at / have / .", "I will not have arrived at school.", "私は学校に到着していないでしょう。"],
            ["movie / started / will / not / have / it / the / .", "It will not have started the movie.", "映画は始まっていないでしょう。"],
            ["city / visited / will / not / you / the / have / .", "You will not have visited the city.", "あなたはその街を訪れていないでしょう。"],
            ["dinner / by / finished / will / not / then / we / have / .", "We will not have finished dinner by then.", "そのときまでに私たちは夕食を終えていないでしょう。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
