    <h1 class="title">be going to 否定肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["not / am / I / going / to / study / today / .", "I am not going to study today.", "私は今日は勉強するつもりはありません。"],
            ["to / am / not / I / going / play / tennis / .", "I am not going to play tennis.", "私はテニスをするつもりはありません。"],
            ["not / going / are / you / to / eat / lunch / ?", "You are not going to eat lunch.", "あなたは昼食を食べるつもりはありません。"],
            ["to / not / you / are / going / visit / the / park / .", "You are not going to visit the park.", "あなたは公園を訪れるつもりはありません。"],
            ["is / not / going / he / to / watch / TV / .", "He is not going to watch TV.", "彼はテレビを見るつもりはありません。"],
            ["not / going / to / is / he / play / baseball / .", "He is not going to play baseball.", "彼は野球をするつもりはありません。"],
            ["not / write / are / to / you / going / a / letter / .", "You are not going to write a letter.", "あなたは手紙を書くつもりはありません。"],
            ["we / not / to / are / clean / going / the / room / .", "We are not going to clean the room.", "私たちは部屋を掃除するつもりはありません。"],
            ["to / not / going / they / are / travel / abroad / .", "They are not going to travel abroad.", "彼らは海外旅行をするつもりはありません。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
