    <!-- タイトル -->

    <h1 class="title">関係副詞 否定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["the / time / when / stayed / home / was / not / it / I / .", "It was not the time when I stayed home.", "それは私が家にいた時ではありません。"],
            ["the / park / we / not / met / is / the / where / .", "This is not the park where we met.", "ここは私たちが会った公園ではありません。"],
            ["reason / study / I / not / is / why / hard / the / this / .", "This is not the reason why I study hard.", "これが私が一生懸命勉強する理由ではありません。"],
            ["the / was / not / day / met / when / Tom / I / that / .", "That was not the day when I met Tom.", "それは私がトムに会った日ではありませんでした。"],
            ["restaurant / the / not / had / lunch / good / is / where / we / .", "The restaurant where we had lunch is not good.", "私たちが昼食を食べたレストランは良くありません。"],
            ["reason / she / was / not / the / why / surprised / is / .", "That is not the reason why she was surprised.", "それは彼女が驚いた理由ではありません。"],
            ["forget / never / will / day / not / won / I / when / the / game / .", "I will not forget the day when I won the game.", "私は試合に勝った日を忘れません。"],
            ["hotel / the / where / stayed / not / good / we / was / .", "The hotel where we stayed was not good.", "私たちが泊まったホテルは良くありませんでした。"],
            ["reason / happy / is / why / not / am / I / this / the / .", "This is not the reason why I am happy.", "これは私が幸せな理由ではありません。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
