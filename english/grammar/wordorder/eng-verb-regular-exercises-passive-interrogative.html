    <h1 class="title">受け身 疑問文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["written / book / by / this / Mr / is / Smith / ?", "Is this book written by Mr. Smith?", "この本はスミス先生によって書かれたのですか。"],
            ["the / was / broken / by / window / ball / a / ?", "Was the window broken by a ball?", "その窓はボールで壊されたのですか。"],
            ["these / students / the / letters / are / by / written / ?", "Are these letters written by the students?", "これらの手紙は生徒たちによって書かれたのですか。"],
            ["spoken / English / Canada / in / is / ?", "Is English spoken in Canada?", "カナダでは英語が話されていますか。"],
            ["homework / done / my / was / yesterday / ?", "Was my homework done yesterday?", "私の宿題は昨日終えられましたか。"],
            ["is / the / cleaned / every / classroom / day / ?", "Is the classroom cleaned every day?", "その教室は毎日掃除されますか。"],
            ["this / mother / cake / by / my / made / was / ?", "Was this cake made by my mother?", "このケーキは私の母によって作られたのですか。"],
            ["songs / sung / these / by / children / are / the / ?", "Are these songs sung by the children?", "これらの歌は子どもたちによって歌われていますか。"],
            ["bike / used / Ken / yesterday / the / by / was / ?", "Was the bike used by Ken yesterday?", "その自転車は昨日ケンに使われたのですか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
