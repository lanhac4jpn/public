<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不定詞 独立不定詞 疑問文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">不定詞 独立不定詞 疑問文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-infinitive-independent-interrogative.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["to / be / honest / are / you / happy / now / ?", "To be honest, are you happy now?", "正直に言うと、あなたは今幸せですか。"],
            ["to / tell / the / truth / did / he / study / English / ?", "To tell the truth, did he study English?", "本当のことを言うと、彼は英語を勉強しましたか。"],
            ["to / begin / with / is / this / problem / easy / ?", "To begin with, is this problem easy?", "まず第一に、この問題は簡単ですか。"],
            ["to / be / frank / do / you / like / soccer / ?", "To be frank, do you like soccer?", "率直に言うと、あなたはサッカーが好きですか。"],
            ["to / my / surprise / was / exam / the / difficult / ?", "To my surprise, was the exam difficult?", "驚いたことに、その試験は難しかったですか。"],
            ["to / be / honest / is / he / a / good / student / ?", "To be honest, is he a good student?", "正直に言うと、彼は良い生徒ですか。"],
            ["to / tell / the / truth / will / they / come / tomorrow / ?", "To tell the truth, will they come tomorrow?", "本当のことを言うと、彼らは明日来ますか。"],
            ["to / begin / with / is / this / story / long / ?", "To begin with, is this story long?", "まず第一に、この話は長いですか。"],
            ["to / my / joy / did / she / win / the / game / ?", "To my joy, did she win the game?", "うれしいことに、彼女は試合に勝ちましたか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
