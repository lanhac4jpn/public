<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前置詞 日付 in/on</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">前置詞 日付 in/on</h1>

    <!-- 単語の説明 -->
    <section class="mt-4">
        <h2>単語説明</h2>
        <ul>
            <li><strong>by（手段）:</strong>「〜で（乗り物・通信・方法）」</li>
            <li><strong>by（近く）:</strong>「〜のそばに」「〜の近くに」</li>
        </ul>
    </section>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-preposition-exercises-6.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["bus / school / go / I / to / by / .", "I go to school by bus.", "私はバスで学校へ行きます。"],
            ["train / city / he / went / by / to / .", "He went to the city by train.", "彼は電車で街へ行きました。"],
            ["by / letter / sent / she / a / .", "She sent a letter by mail.", "彼女は手紙を郵便で送りました。"],
            ["the / sits / window / by / she / .", "She sits by the window.", "彼女は窓のそばに座っています。"],
            ["by / the / lives / he / river / .", "He lives by the river.", "彼は川のそばに住んでいます。"],
            ["by / sea / the / walk / I / sometimes / .", "I sometimes walk by the sea.", "私はときどき海のそばを歩きます。"],
            ["airplane / traveled / they / by / .", "They traveled by airplane.", "彼らは飛行機で旅行しました。"],
            ["is / tree / by / the / cat / the / .", "The cat is by the tree.", "その猫は木のそばにいます。"],
            ["by / car / to / work / goes / he / .", "He goes to work by car.", "彼は車で仕事に行きます。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/AnswerAreaIns.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
