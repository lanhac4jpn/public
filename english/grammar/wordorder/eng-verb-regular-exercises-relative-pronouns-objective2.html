    <h1 class="title">関係代名詞・目的格 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["is / the / book / I / read / which / this / yesterday / .", "This is the book which I read yesterday.", "これは私が昨日読んだ本です。"],
            ["the / man / met / in / he / park / she / whom / is / the / .", "He is the man whom she met in the park.", "彼は彼女が公園で会った男性です。"],
            ["the / watched / which / I / was / movie / interesting / .", "The movie which I watched was interesting.", "私が見たその映画は面白かったです。"],
            ["the / she / letter / wrote / this / that / is / the / .", "This is the letter that she wrote.", "これは彼女が書いた手紙です。"],
            ["the / teacher / we / that / yesterday / which / visited / is / the / .", "That is the teacher which we visited yesterday.", "あれは私たちが昨日訪ねた先生です。"],
            ["dog / like / this / the / I / which / is / the / .", "This is the dog which I like.", "これは私が好きな犬です。"],
            ["boy / met / in / I / he / whom / Kyoto / is / the / .", "He is the boy whom I met in Kyoto.", "彼は私が京都で会った少年です。"],
            ["bought / she / the / bag / this / yesterday / which / is / the / .", "This is the bag which she bought yesterday.", "これは彼女が昨日買ったかばんです。"],
            ["they / the / visited / temple / that / which / last / year / is / the / .", "That is the temple which they visited last year.", "あれは彼らが昨年訪れた寺です。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
