<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>助動詞 Must 疑問文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">助動詞 Must 疑問文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-auxiliary-must-interrogative.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["must / I / go / now / ?", "Must I go now?", "私は今行かなければなりませんか。"],
            ["do / homework / I / must / my / ?", "Must I do my homework?", "私は宿題をしなければなりませんか。"],
            ["must / you / study / today / ?", "Must you study today?", "あなたは今日勉強しなければなりませんか。"],
            ["go / must / you / to / school / ?", "Must you go to school?", "あなたは学校に行かなければなりませんか。"],
            ["he / must / take / medicine / his / ?", "Must he take his medicine?", "彼は薬を飲まなければなりませんか。"],
            ["must / he / play / piano / the / ?", "Must he play the piano?", "彼はピアノを弾かなければなりませんか。"],
            ["be / must / careful / you / ?", "Must you be careful?", "あなたは気をつけなければなりませんか。"],
            ["must / we / clean / the / room / ?", "Must we clean the room?", "私たちは部屋を掃除しなければなりませんか。"],
            ["study / must / English / they / ?", "Must they study English?", "彼らは英語を勉強しなければなりませんか。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
