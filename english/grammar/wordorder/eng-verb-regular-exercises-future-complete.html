    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["finished / I / will / have / homework / my / .", "I will have finished my homework.", "私は宿題を終えているでしょう。"],
            ["the / will / she / book / read / have / .", "She will have read the book.", "彼女はその本を読み終えているでしょう。"],
            ["we / lunch / will / have / eaten / .", "We will have eaten lunch.", "私たちは昼食を食べ終えているでしょう。"],
            ["he / homework / have / will / done / his / .", "He will have done his homework.", "彼は宿題を終えているでしょう。"],
            ["built / they / house / a / have / will / .", "They will have built a house.", "彼らは家を建て終えているでしょう。"],
            ["arrived / will / I / school / have / at / .", "I will have arrived at school.", "私は学校に到着しているでしょう。"],
            ["movie / will / have / started / the / it / .", "It will have started the movie.", "映画は始まっているでしょう。"],
            ["the / visited / city / have / will / you / .", "You will have visited the city.", "あなたはその街を訪れているでしょう。"],
            ["finished / by / we / will / dinner / have / then / .", "We will have finished dinner by then.", "そのときまでに私たちは夕食を終えているでしょう。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
