<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>関係代名詞 as/than 肯定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">関係代名詞 as/than 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-relative-asthan.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["the / same / book / as / I / have / is / this / .", "This is the same book as I have.", "これは私が持っているのと同じ本です。"],
            ["such / boy / kind / as / is / he / everyone / likes / .", "He is such a kind boy as everyone likes.", "彼は誰からも好かれるような親切な少年です。"],
            ["the / same / mistake / made / I / as / he / did / .", "He made the same mistake as I did.", "彼は私がしたのと同じ間違いをしました。"],
            ["such / things / she / as / likes / are / these / .", "These are such things as she likes.", "これらは彼女が好きなようなものです。"],
            ["the / same / pen / has / she / as / lost / I / .", "She has lost the same pen as I have.", "彼女は私が持っているのと同じペンをなくしました。"],
            ["a / such / man / as / respects / everyone / he / is / .", "He is such a man as everyone respects.", "彼は誰からも尊敬されるような人です。"],
            ["different / opinion / have / you / than / I / do / .", "You have a different opinion than I do.", "あなたは私とは違う意見を持っています。"],
            ["better / singer / is / she / than / I / thought / .", "She is a better singer than I thought.", "彼女は私が思っていたより良い歌手です。"],
            ["the / same / story / told / as / was / he / I / .", "He told the same story as I did.", "彼は私が話したのと同じ話をしました。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
