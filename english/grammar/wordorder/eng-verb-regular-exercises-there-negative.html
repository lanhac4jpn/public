<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>There構文 否定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">There構文 否定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-there-negative.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["is / not / near / there / park / a / .", "There is not a park near.", "近くに公園はありません。"],
            ["desk / room / not / there / in / is / my / a / .", "There is not a desk in my room.", "私の部屋に机はありません。"],
            ["is / on / apple / not / table / the / an / there / .", "There is not an apple on the table.", "テーブルの上にりんごはありません。"],
            ["books / there / the / desk / on / are / not / many / .", "There are not many books on the desk.", "机の上にたくさんの本はありません。"],
            ["class / the / students / are / in / there / not / ten / .", "There are not ten students in the class.", "クラスに10人の生徒はいません。"],
            ["not / under / cats / are / tree / the / two / there / .", "There are not two cats under the tree.", "木の下に2匹の猫はいません。"],
            ["bus / stop / not / there / in / is / a / front / .", "There is not a bus stop in front.", "前にバス停はありません。"],
            ["some / are / not / there / in / flowers / the / garden / beautiful / .", "There are not some beautiful flowers in the garden.", "庭にきれいな花はありません。"],
            ["many / the / in / there / not / people / park / are / .", "There are not many people in the park.", "公園にたくさんの人はいません。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
