<head>

<body class="container mt-5">

    <!-- タイトル -->
    <?php include 'eng-inc-close-btn.html'; ?>
    <h1 class="title">whether 否定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["I / not / know / whether / true / is / story / the / .", "I do not know whether the story is true.", "私はその話が本当かどうか分かりません。"],
            ["he / not / remember / whether / locked / the / did / door / .", "He did not remember whether he locked the door.", "彼はドアに鍵をかけたかどうか覚えていませんでした。"],
            ["we / not / sure / whether / are / ready / we / .", "We are not sure whether we are ready.", "私たちは準備ができているかどうか確かではありません。"],
            ["she / not / ask / whether / busy / was / he / did / .", "She did not ask whether he was busy.", "彼女は彼が忙しいかどうか尋ねませんでした。"],
            ["they / could / not / decide / whether / join / to / the / club / .", "They could not decide whether to join the club.", "彼らはクラブに入るかどうか決められませんでした。"],
            ["not / I / sure / whether / will / come / he / am / .", "I am not sure whether he will come.", "私は彼が来るかどうか確かではありません。"],
            ["not / know / she / whether / exam / the / pass / he / will / .", "She does not know whether he will pass the exam.", "彼が試験に合格するかどうか彼女は知りません。"],
            ["the / teacher / not / ask / whether / ready / were / we / did / .", "The teacher did not ask whether we were ready.", "先生は私たちが準備できているかどうか尋ねませんでした。"],
            ["not / wonder / they / whether / true / was / news / the / did / .", "They did not wonder whether the news was true.", "彼らはそのニュースが本当かどうか不思議に思いませんでした。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
