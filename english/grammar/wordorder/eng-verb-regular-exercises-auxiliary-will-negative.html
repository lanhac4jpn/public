<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>助動詞 Will 否定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">助動詞 Will 否定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-auxiliary-will-negative.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["tomorrow / not / Kyoto / visit / will / I / .", "I will not visit Kyoto tomorrow.", "私は明日京都を訪れません。"],
            ["soon / will / help / not / I / you / .", "I will not help you soon.", "私はすぐにあなたを助けません。"],
            ["early / come / not / will / you / .", "You will not come early.", "あなたは早く来ません。"],
            ["study / English / will / not / tomorrow / you / .", "You will not study English tomorrow.", "あなたは明日英語を勉強しません。"],
            ["he / not / soccer / will / play / .", "He will not play soccer.", "彼はサッカーをしません。"],
            ["will / not / he / tomorrow / be / busy / .", "He will not be busy tomorrow.", "彼は明日忙しくありません。"],
            ["you / today / not / help / me / will / .", "You will not help me today.", "あなたは今日私を助けません。"],
            ["go / not / together / will / we / .", "We will not go together.", "私たちは一緒に行きません。"],
            ["they / London / visit / not / next / year / will / .", "They will not visit London next year.", "彼らは来年ロンドンを訪れません。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
