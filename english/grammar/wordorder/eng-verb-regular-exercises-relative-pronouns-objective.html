<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>関係代名詞・目的格 肯定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">関係代名詞・目的格 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-relative-pronouns-objective.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["the / book / gave / which / me / she / is / this / .", "This is the book which she gave me.", "これは彼女が私にくれた本です。"],
            ["boy / the / I / whom / saw / at / the / station / is / that / .", "That is the boy whom I saw at the station.", "あれは私が駅で見かけた少年です。"],
            ["the / which / this / we / room / cleaned / is / the / yesterday / .", "This is the room which we cleaned yesterday.", "これは私たちが昨日掃除した部屋です。"],
            ["the / she / met / he / teacher / whom / is / English / .", "He is the English teacher whom she met.", "彼は彼女が会った英語の先生です。"],
            ["the / bought / which / pen / this / I / is / new / the / .", "This is the new pen which I bought.", "これは私が買った新しいペンです。"],
            ["the / woman / whom / helped / I / is / kind / the / .", "The woman whom I helped is kind.", "私が助けたその女性は親切です。"],
            ["the / food / made / yesterday / she / which / is / the / delicious / .", "The food which she made yesterday is delicious.", "彼女が昨日作った料理はおいしいです。"],
            ["the / met / rich / whom / they / in / is / America / man / the / .", "The man whom they met in America is rich.", "彼らがアメリカで会ったその男性は裕福です。"],
            ["the / bought / this / which / I / CD / is / the / new / .", "This is the new CD which I bought.", "これは私が買った新しいCDです。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
