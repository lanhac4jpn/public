<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不定詞 原形不定詞 使役動詞 肯定文 確認テスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- タイトル -->
    <close-btn></close-btn>
    <h1 class="title">不定詞 原形不定詞 使役動詞 肯定文 確認テスト</h1>

    <!-- 問題 -->
    <section>
        <h2>問題</h2>
        <p>以下の単語を正しい語順に並べ替えて、正しい英文を作りましょう。</p>
        <img src="./eng-verb-regular-exercises-infinitive-base-causative.png"/>
        <div id="question-area"></div>
    </section>

    <script>
        const questions = [
            ["made / my / me / clean / father / room / .", "My father made me clean my room.", "父は私に部屋を掃除させました。"],
            ["let / me / use / she / her / bike / .", "She let me use her bike.", "彼女は私に自転車を使わせました。"],
            ["the / us / read / teacher / had / book / the / .", "The teacher had us read the book.", "先生は私たちにその本を読ませました。"],
            ["mother / cook / dinner / made / my / me / .", "My mother made me cook dinner.", "母は私に夕食を作らせました。"],
            ["let / play / in / park / children / the / him / .", "He let the children play in the park.", "彼は子どもたちを公園で遊ばせました。"],
            ["the / her / piano / teacher / practice / had / her / .", "Her teacher had her practice the piano.", "先生は彼女にピアノを練習させました。"],
            ["boss / work / late / had / my / him / .", "My boss had him work late.", "上司は彼に遅くまで働かせました。"],
            ["us / help / homework / made / teacher / our / the / each / other / .", "The teacher made us help each other with our homework.", "先生は私たちに宿題で互いに助け合うようにさせました。"],
            ["father / wash / his / car / let / him / .", "His father let him wash his car.", "彼の父は彼に車を洗わせました。"]
        ];

        let allQuestionsHtml = "";
        questions.forEach((q, index) => {
            const count = index + 1;
            allQuestionsHtml += `
                <div class="mb-3">
                    <p><strong>問題 ${count}:</strong> (${q[0]}) - ${q[2]}</p>
                    <delete-btn></delete-btn>
                    <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#answer${count}">解答と解説</button>
                    <div class="collapse" id="answer${count}">
                        <div class="card card-body mt-2">
                            <p><strong>解答:</strong> ${q[1]}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // 画面に流し込む
        document.getElementById('question-area').innerHTML = allQuestionsHtml;
    </script>
    <close-btn></close-btn>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lettercut.js"></script>
    <script src="../js/common-components.js"></script>
</body>
</html>
