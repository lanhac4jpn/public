        $questions = [
            ["born / in / 2005 / was / I / .", "I was born in 2005.", "私は2005年に生まれました。"],
            ["in / summer / we / go / often / swimming / .", "We often go swimming in summer.", "私たちはよく夏に泳ぎに行きます。"],
            ["in / December / snow / it / sometimes / .", "It sometimes snows in December.", "12月にはときどき雪が降ります。"],
            ["on / Sunday / go / we / to / the / park / .", "We go to the park on Sunday.", "私たちは日曜日に公園へ行きます。"],
            ["birthday / my / is / on / May / 10th / .", "My birthday is on May 10th.", "私の誕生日は5月10日です。"],
